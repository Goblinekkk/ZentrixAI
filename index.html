<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrix AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <button onclick="toggleSidebar()" class="menu-trigger">Menu</button>
        <span class="logo">ZENTRIX</span>
    </nav>

    <div id="sidebar" class="sidebar">
        <span class="close" onclick="toggleSidebar()">&times;</span>
        <div class="nav-links">
            <a href="#" onclick="showChat()">Nový Chat</a>
            <a href="#" onclick="showCrypto()">Crypto</a>
            <a href="#" onclick="showHistory()">Historie</a>
        </div>
    </div>

    <main id="content">
        <div id="chat-wrapper">
            <div id="messages"></div>
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Napište zprávu..." autocomplete="off">
                <button onclick="send()">Poslat</button>
            </div>
        </div>

        <div id="crypto-wrapper" class="hidden">
            <div id="crypto-data"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
