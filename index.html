<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENTRIX AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <nav class="navbar">
        <button class="nav-btn" onclick="toggleSidebar()">MENU</button>
        <div class="logo">ZENTRIX</div>
        <button id="theme-btn" class="nav-btn" onclick="toggleDarkMode()">DARK</button>
    </nav>

    <div id="sidebar" class="sidebar">
        <span class="close-icon" onclick="toggleSidebar()">×</span>
        <div class="sidebar-content">
            <p class="label">AI MOZKY</p>
            <button class="opt" onclick="setModel('Qwen/Qwen2.5-72B-Instruct')">Qwen 72B (Smart)</button>
            <button class="opt" onclick="setModel('meta-llama/Llama-3.2-3B-Instruct')">Llama 3.2 (Fast)</button>
            
            <p class="label">FUNKCE</p>
            <button class="opt" onclick="showChat()">Nový Chat</button>
            <button class="opt" onclick="showCrypto()">Crypto Market</button>

            <p class="label">NASTAVENÍ</p>
            <input type="password" id="keyInput" placeholder="Vlož hf_ kód zde..." class="key-input">
            <button class="save-btn" onclick="saveKey()">ULOŽIT KLÍČ</button>
        </div>
    </div>

    <main id="app">
        <div id="chat-view">
            <div id="messages"></div>
            <div class="bottom-bar">
                <input type="text" id="userInput" placeholder="Napiš zprávu...">
                <button onclick="send()">POSLAT</button>
            </div>
        </div>
        <div id="crypto-view" class="hidden">
            <div id="crypto-list"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
