<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENTRIX AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <nav class="navbar">
        <button class="menu-btn" onclick="toggleSidebar()">MENU</button>
        <div class="logo">ZENTRIX</div>
        <button id="theme-btn" class="theme-btn" onclick="toggleDarkMode()">DARK</button>
    </nav>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="close-icon" onclick="toggleSidebar()">×</span>
        </div>
        <div class="nav-links">
            <p class="section-label">NAVIGACE</p>
            <a href="#" onclick="showChat()">Nový Chat</a>
            <a href="#" onclick="showCrypto()">Crypto Market</a>
            
            <p class="section-label">VÝBĚR MOZKU (AI)</p>
            <button class="model-select" onclick="setModel('Qwen/Qwen2.5-72B-Instruct')">Qwen 72B (Smart)</button>
            <button class="model-select" onclick="setModel('meta-llama/Llama-3.2-3B-Instruct')">Llama 3.2 (Fast)</button>
            <button class="model-select" onclick="setModel('mistralai/Mistral-7B-Instruct-v0.3')">Mistral 7B</button>
        </div>
    </div>

    <main id="app">
        <div id="chat-view">
            <div id="messages"></div>
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Zeptej se na cokoli..." autocomplete="off">
                <button class="send-btn" onclick="send()">POSLAT</button>
            </div>
        </div>

        <div id="crypto-view" class="hidden">
            <div id="crypto-list"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
